name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # for trusted publishing
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        run: uv publish
        # Trusted publishing: uv publish picks up the GitHub OIDC token
        # automatically (no password needed). Add this repo in PyPI project
        # settings first:
        # PyPI → Your Project → Publishing → Add new pending publisher
        # Owner: nndn, Repository: Provenance, Workflow: publish-pypi.yml
